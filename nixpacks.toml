# Configuration Nixpacks pour Railway (Root Directory = root)
# Force Python 3.11 (vs 3.14 local qui pose problème avec httpcore/supabase)
# Utilise un venv pour contourner PEP 668 / externally-managed-environment

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.virtualenv", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r backend/requirements.txt"
]

[start]
cmd = "cd backend && /opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 75"
