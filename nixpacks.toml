# Configuration Nixpacks pour Railway
# Python 3.11 forcé. Install global avec --break-system-packages
# (PEP 668 désactivé puisqu'on est dans un container, pas un OS user).

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip --break-system-packages",
  "python -m pip install -r backend/requirements.txt --break-system-packages"
]

[start]
cmd = "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 75"
