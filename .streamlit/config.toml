[global]
developmentMode = false

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 10

[browser]
gatherUsageStats = false

[theme]
base = "light"
font = "sans serif"
primaryColor = "#1B2A4A"

[runner]
# Evite les rechargements intempestifs sur les fichiers de logs
fastReruns = true
