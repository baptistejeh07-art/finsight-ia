<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>FinSight IA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #0c0c0c;
      background: #fafaf5;
    }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .tagline { font-size: 11px; color: #666; margin-bottom: 16px; }
    .list { list-style: none; }
    .list li {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; font-size: 12px; color: #333;
      border-bottom: 1px solid #eee;
    }
    .list li:last-child { border-bottom: none; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #16a34a; flex-shrink: 0; }
    .cta {
      display: block; width: 100%; margin-top: 16px;
      padding: 10px; text-align: center;
      background: #0c0c0c; color: #fff; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      text-decoration: none;
    }
    .cta:hover { background: #2a2a2a; }
    .foot { margin-top: 12px; font-size: 10px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <h1>FinSight IA 📊</h1>
  <div class="tagline">Votre analyste financier propulsé par IA</div>

  <ul class="list">
    <li><span class="dot"></span> Yahoo Finance</li>
    <li><span class="dot"></span> TradingView</li>
    <li><span class="dot"></span> Boursorama</li>
    <li><span class="dot"></span> Google Finance</li>
    <li><span class="dot"></span> Morningstar</li>
    <li><span class="dot"></span> Investing.com</li>
    <li><span class="dot"></span> Zonebourse</li>
  </ul>

  <a class="cta" href="https://finsight-ia.com/app?utm_source=chrome_extension&utm_medium=popup" target="_blank">
    Ouvrir FinSight
  </a>

  <div class="foot">Version 1.0.0 · finsight-ia.com</div>
</body>
</html>
